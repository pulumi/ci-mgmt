permissions: write-all
name: Deploy infrastructure stacks
on:
  merge_group: {}
  pull_request: {}
  workflow_dispatch: {}

env:
  ESC_ACTION_OIDC_AUTH: true
  ESC_ACTION_OIDC_ORGANIZATION: pulumi
  ESC_ACTION_OIDC_REQUESTED_TOKEN_TYPE: urn:pulumi:token-type:access_token:organization
  ESC_ACTION_ENVIRONMENT: github-secrets/pulumi-ci-mgmt

jobs:
  deploy-provider-repos:
    name: Deploy provider repository settings
    runs-on: ubuntu-latest
    concurrency:
      group: pulumi-provider-repos
      cancel-in-progress: false # Don't cancel in-progress deployments
    steps:
      - name: Fetch secrets from ESC
        id: esc-secrets
        uses: pulumi/esc-action@8afe12bb7bb3df0a599e5309ee429ff1079ba85f # v3

      - name: Checkout Repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install mise
        uses: jdx/mise-action@d53861813ec96de6a7b18548a2c75ba8f6055fbf
        with:
          version: 2026.3.7

      - name: Install dependencies
        working-directory: infra/providers
        run: npm ci

      - name: Pulumi login
        run: pulumi login https://api.pulumi.com
        env:
          PULUMI_ACCESS_TOKEN: ${{ steps.esc-secrets.outputs.PULUMI_ACCESS_TOKEN }}

      - name: Select stack
        working-directory: infra/providers
        run: pulumi stack select pulumi/pulumi-provider-repos/production

      - name: Pulumi up
        if: github.event_name == 'merge_group'
        working-directory: infra/providers
        run: pulumi up --yes --skip-preview
        env:
          PULUMI_ACCESS_TOKEN: ${{ steps.esc-secrets.outputs.PULUMI_ACCESS_TOKEN }}

      - name: Pulumi preview
        if: github.event_name == 'pull_request'
        working-directory: infra/providers
        run: pulumi preview
        env:
          PULUMI_ACCESS_TOKEN: ${{ steps.esc-secrets.outputs.PULUMI_ACCESS_TOKEN }}
