permissions:
  id-token: write
name: Upgrade Agentic Workflows

on:
  workflow_dispatch: {}
  schedule:
    # 5:30AM UTC every Monday.
    - cron: '30 5 * * 1'

env:
  ESC_ACTION_OIDC_AUTH: true
  ESC_ACTION_OIDC_ORGANIZATION: pulumi
  ESC_ACTION_OIDC_REQUESTED_TOKEN_TYPE: urn:pulumi:token-type:access_token:organization
  ESC_ACTION_ENVIRONMENT: github-secrets/pulumi-ci-mgmt

jobs:
  upgrade:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch secrets from ESC
        id: esc-secrets
        uses: pulumi/esc-action@8afe12bb7bb3df0a599e5309ee429ff1079ba85f # v3
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-auth
        with:
          app-id: ${{ steps.esc-secrets.outputs.PULUMI_PROVIDER_AUTOMATION_APP_ID }}
          private-key: ${{ steps.esc-secrets.outputs.PULUMI_PROVIDER_AUTOMATION_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
      - name: Checkout ci-mgmt
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          token: ${{ steps.app-auth.outputs.token }}
      - name: Install mise
        uses: jdx/mise-action@c6a35e2d7dc8cf1493e7465af7460b4748cd4806
        with:
          version: 2026.3.7
          install: true
          github_token: ${{ steps.app-auth.outputs.token }}
      - name: Bump gh-aw to the latest release via mise
        # gh-aw is managed by mise in this repo, not installed as a gh
        # extension. `gh-aw upgrade` self-upgrades a gh extension and then
        # re-execs itself, which fails here (pulumi/ci-mgmt#2269): there is no
        # gh extension to upgrade and the re-exec resolves a stale mise path.
        # Let mise own the version and regenerate lock files with `gh-aw
        # compile` instead, which keeps the same weekly auto-upgrade behavior
        # without the broken self-re-exec.
        # --pin writes the concrete resolved version into mise.toml (rather than
        # a floating "latest") so the committed lock files stay reproducible.
        run: mise use --pin github:github/gh-aw@latest
      - name: Update root agentic workflows from sources
        run: gh-aw update --force
        env:
          GH_TOKEN: ${{ steps.app-auth.outputs.token }}
      - name: Compile agentic workflows
        run: gh-aw compile
        env:
          GH_TOKEN: ${{ steps.app-auth.outputs.token }}
      - name: Remove unused gh-aw generated files
        run: |
          rm -rf .github/agents
          rm -f .github/workflows/copilot-setup-steps.yml
      - name: Sync provider-ci templates
        run: ./scripts/sync-gh-aw-templates.sh
      - name: Verify generated provider fixtures
        working-directory: provider-ci
        run: make gen
      - name: Create PR
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          author: Pulumi Bot <bot@pulumi.com>
          body: "This PR upgrades the root gh-aw workflows, syncs them into provider-ci templates, and regenerates provider fixtures."
          branch: "upgrade-agentic-workflows"
          committer: Pulumi Bot <bot@pulumi.com>
          commit-message: |
            [internal] Upgrade agentic workflows

            Co-authored-by: Codex <noreply@openai.com>
          labels: "impact/no-changelog-required"
          title: "Upgrade agentic workflows"
          token: ${{ steps.app-auth.outputs.token }}
