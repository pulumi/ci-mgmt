#{{ if .Config.GenerateNightlyTestWorkflow -}}#
# WARNING: This file is autogenerated - changes will be overwritten when regenerated by https://github.com/pulumi/ci-mgmt

env:
#{{ .Config | renderGlobalEnv | indent 2 }}#

jobs:
  prerequisites:
    permissions:
      contents: read
      pull-requests: write
      id-token: write # For ESC secrets.
    uses: ./.github/workflows/prerequisites.yml
    secrets: inherit
    with:
      default_branch: ${{ github.event.repository.default_branch }}
      is_pr: ${{ github.event_name == 'pull_request' }}
      is_automated: ${{ github.actor == 'dependabot[bot]' }}

  build_provider:
    uses: ./.github/workflows/build_provider.yml
    needs: prerequisites
    secrets: inherit
    permissions:
      contents: read
      id-token: write # For ESC secrets.
    with:
      version: ${{ needs.prerequisites.outputs.version }}

  #{{ if not .Config.NoSchema -}}#
  build_sdk:
    name: build_sdk
    needs: prerequisites
    uses: ./.github/workflows/build_sdk.yml
    secrets: inherit
    permissions:
      contents: write # For Renovate SDKs.
      id-token: write # For ESC secrets.
    with:
      version: ${{ needs.prerequisites.outputs.version }}
  #{{- end }}#

#{{- if .Config.AcceptanceTestSuites }}#
#{{- range $_, $suite := .Config.AcceptanceTestSuites }}#

  acceptance_#{{ $suite.Name }}#:
    uses: ./.github/workflows/test.yml
    needs:
      - prerequisites
      - build_provider
#{{- if $suite.NeedsSDKs }}#
      - build_sdk
#{{- end }}#
    permissions:
      contents: read
      id-token: write
    secrets: inherit
    with:
      version: ${{ needs.prerequisites.outputs.version }}
      suite_root: #{{ $suite.Root | quote }}#
      shard_count: #{{ $suite.Shards }}#
      shard_indices: '#{{ until $suite.Shards | toJson }}#'
      requires_sdks: #{{ $suite.NeedsSDKs }}#

#{{- end }}#
#{{- else }}#

  test:
    uses: ./.github/workflows/test.yml
    needs:
      - prerequisites
      - build_provider
#{{- if not .Config.NoSchema }}#
      - build_sdk
#{{- end }}#
    permissions:
      contents: read
      id-token: write
    secrets: inherit
    with:
      version: ${{ needs.prerequisites.outputs.version }}

#{{- end }}#

name: cron
on:
  schedule:
  - cron: 0 6 * * *
#{{ end -}}#
