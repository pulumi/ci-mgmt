      mise-version: 2026.3.7
      checkout-submodules: 'true'

  post_build:
    name: post_build
    needs: prerequisites
    uses: ./.github/workflows/main-post-build.yml
    secrets: inherit
    permissions:
      contents: write # For Renovate SDKs.
      id-token: write # For ESC secrets.
